<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<title>ورود ادمین | TCM MC</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #05070f;
    --panel: linear-gradient(160deg, #0e1533 0%, #0a102b 100%);
    --border: #1c2650;
    --border-bright: #33447f;
    --blue: #3d63f5;
    --blue-bright: #6f8dff;
    --sky: #5ecbff;
    --text: #eef2ff;
    --muted: #93a3ce;
    --muted-2: #62729f;
    --shadow-soft: 0 1px 0 rgba(255,255,255,0.05) inset, 0 18px 40px -22px rgba(0,0,0,0.75);
    --shadow-lift: 0 26px 60px -20px rgba(3,8,25,0.85), 0 1px 0 rgba(255,255,255,0.06) inset;
    --radius-card: 20px;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    min-height:100vh;
    font-family:'Vazirmatn', sans-serif;
    color:var(--text);
    background:var(--bg);
  }

  /* همون فضای پس‌زمینه‌ی سایت اصلی */
  .scene{
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(ellipse 65% 45% at 50% -5%, rgba(99,211,255,0.16), transparent 60%),
      radial-gradient(ellipse 50% 35% at 50% 5%, rgba(61,99,245,0.20), transparent 65%),
      linear-gradient(180deg, #0a1230 0%, #060a1c 55%, #050813 100%);
    pointer-events:none;
  }

  .wrap{
    position:relative; z-index:1;
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px;
    gap:22px;
  }

  .brand{
    display:flex; align-items:center; gap:10px;
    font-weight:800; font-size:19px;
  }
  .brand .full{ direction:ltr; letter-spacing:0.2px; }
  .brand .full b{
    background:linear-gradient(90deg, var(--sky), var(--blue-bright));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .brand .crown{ font-size:20px; }

  .card{
    width:100%; max-width:400px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius-card);
    box-shadow: var(--shadow-soft);
    padding:32px 28px 28px;
  }

  .card h1{
    font-size:19px;
    font-weight:800;
    margin-bottom:6px;
    text-align:center;
  }
  .card .sub{
    font-size:13px;
    color:var(--muted);
    text-align:center;
    margin-bottom:26px;
  }

  .field{ margin-bottom:16px; }
  .field label{
    display:block;
    font-size:12.5px;
    color:var(--muted);
    margin-bottom:7px;
    font-weight:600;
  }
  .field input{
    width:100%;
    padding:13px 16px;
    background:rgba(255,255,255,0.02);
    border:1px solid var(--border-bright);
    border-radius:12px;
    color:var(--text);
    font-family:inherit;
    font-size:14px;
    outline:none;
    transition: border-color .18s ease, background .18s ease, box-shadow .18s ease;
  }
  .field input::placeholder{ color:var(--muted-2); }
  .field input:focus{
    border-color:var(--sky);
    background:rgba(99,211,255,0.05);
    box-shadow: 0 0 0 3px rgba(94,203,255,0.15);
  }

  .login-btn{
    width:100%;
    margin-top:10px;
    position:relative;
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:15px 20px;
    background:linear-gradient(178deg, #6086ff 0%, #3d63f5 45%, #2c46c4 100%);
    color:#fff;
    font-family:inherit;
    font-weight:800;
    font-size:15px;
    letter-spacing:0.2px;
    border:1px solid rgba(159,180,255,0.65);
    border-radius:999px;
    cursor:pointer;
    box-shadow: 0 18px 40px -14px rgba(30,50,180,0.75), inset 0 1.5px 0 rgba(255,255,255,0.4), inset 0 -10px 18px -10px rgba(0,0,0,0.4);
    transition: transform .2s cubic-bezier(.16,.8,.3,1), box-shadow .2s ease, filter .2s ease, opacity .2s ease;
  }
  .login-btn:hover{ transform:translateY(-2px); filter:brightness(1.05); }
  .login-btn:active{ transform:translateY(0) scale(.98); }
  .login-btn:disabled{ opacity:.6; cursor:not-allowed; transform:none; }

  .back-link{
    display:inline-flex; align-items:center; gap:6px;
    padding:10px 20px;
    font-size:13px; font-weight:600;
    color:var(--muted);
    border:1px solid var(--border-bright);
    background:rgba(255,255,255,0.015);
    text-decoration:none;
    border-radius:999px;
    transition: color .18s ease, border-color .18s ease, background .18s ease, transform .18s cubic-bezier(.16,.8,.3,1);
  }
  .back-link:hover{ color:var(--text); border-color:var(--sky); background:rgba(99,211,255,0.08); transform:translateY(-1px); }

  .foot-note{
    font-size:12px;
    color:var(--muted-2);
    text-align:center;
  }
</style>
</head>

<body>

<div class="scene" aria-hidden="true"></div>

<div class="wrap">

  <div class="brand">
    <span class="crown">👑</span>
    <span class="full">TCM <b>MC</b></span>
  </div>

  <div class="card">
    <h1>ورود ادمین</h1>
    <p class="sub">برای مدیریت محتوای سایت وارد شو</p>

    <div class="field">
      <label for="email">ایمیل ادمین</label>
      <input id="email" type="email" placeholder="admin@example.com" autocomplete="username">
    </div>

    <div class="field">
      <label for="password">رمز عبور</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button id="loginBtn" class="login-btn">ورود</button>
  </div>

  <a href="index.html" class="back-link">🏠 بازگشت به سایت اصلی</a>

  <div class="foot-note">TCM MC · پنل مدیریت محتوا</div>

</div>

<script type="module">

import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyBxhXIVDhXNSisJ0v81ZtdjAZZt9vorNig",
  authDomain: "tcm-mc-173a6.firebaseapp.com",
  projectId: "tcm-mc-173a6",
  storageBucket: "tcm-mc-173a6.firebasestorage.app",
  messagingSenderId: "490709082172",
  appId: "1:490709082172:web:6ec840d278caef9112a339"
};


const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);

const auth = getAuth(app);
const db = getFirestore(app);

const loginBtn = document.getElementById("loginBtn");

loginBtn.onclick = function(){

  if(loginBtn.disabled) return; // جلوگیری از کلیک/ارسال تکراری
  loginBtn.disabled = true;

  let email = document.getElementById("email").value.trim();

  let password = document.getElementById("password").value;


  signInWithEmailAndPassword(auth, email, password)

  .then(async (userCredential) => {

    // بررسی اینکه این کاربر واقعاً در لیست ادمین‌های Firestore هست یا نه
    const adminDocRef = doc(db, "admins", userCredential.user.uid);
    const adminSnap = await getDoc(adminDocRef);

    if(!adminSnap.exists()){
      await signOut(auth);
      alert("این حساب دسترسی ادمین نداره.");
      loginBtn.disabled = false;
      return;
    }

    alert("ورود موفق شد!");

    window.location.href = "index.html";

  })


  .catch((error) => {

    alert("خطا: ایمیل یا رمز اشتباه است");

    console.log(error);

    loginBtn.disabled = false;

  });


};

</script>

</body>
</html>
